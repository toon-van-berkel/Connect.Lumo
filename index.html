<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./assets/LUMOconnect-logo.png" type="image/x-icon">
    <title>Connect.Lumo</title>
    <link rel="stylesheet" href="./styles/style.css">
    <script defer type="module" src="./javascript/app.js"></script>
</head>
<body>
    <div class="top-bar">
        <ul>
            <li>
                <select aria-label="language switch" name="language switch" id="languageSelector">
                    <option value="en-gb">English</option>
                    <option value="nl-nl">Nederlands</option>
                    <option value="de-de">Deutsch</option>
                    <option value="fr-fr">Français</option>
                    <option value="zh-cn">中文</option>
                    <option value="ja-jp">日本語</option>
                    <option value="is-is">Íslenska</option>

                    <option value="en-gb-na">English - deaf friendly</option>
                    <option value="nl-nl-na">Nederlands - doofvriendelijk</option>
                    <option value="de-de-na">Deutsch - Gehörlosenfreundlich</option>
                    <option value="fr-fr-na">Français - adapté aux personnes sourdes</option>
                    <option value="zh-cn-na">中文 - 聋人友好</option>
                    <option value="ja-jp-na">日本語 - ろう者にやさしい</option>
                    <option value="is-is-na">Íslenska - heyrnarlausavæn</option>
                </select>
            </li>
        </ul>
    </div>
    <!-- <nav id="nav"></nav> -->
    <main>
        <div class="notification-container" id="notificationContainer"></div>
        <section class="container" id="container">
            <button id="connect"></button>
        </section>
    </main>
    <!-- <footer id="footer"></footer> -->
</body>
</html>
